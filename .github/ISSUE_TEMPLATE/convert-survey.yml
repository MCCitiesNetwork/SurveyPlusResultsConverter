name: Convert Survey JSON
description: Provides Xenforo BBCode and CSV output for a survey JSON export
title: "[Convert] "
labels:
  - convert
body:
  - type: markdown
    attributes:
      value: |
        Provide the survey JSON URL and either pick a config from `configs/` or paste a custom config JSON.

  - type: input
    id: json_url
    attributes:
      label: Raw survey JSON URL
      description: Direct link to the JSON file (e.g. Raw Gist, Raw paste.dev, etc.)
      placeholder: https://api.pastes.dev/2LAFIRLm20
    validations:
      required: true

  - type: dropdown
    id: config_source
    attributes:
      label: Config source
      description: Use a predefined config or paste a custom one
      options:
        - Use config from configs/ folder
        - Paste custom config JSON below
    validations:
      required: true

  - type: dropdown
    id: config_file
    attributes:
      label: Configuration File
      description: Choose a configuration file (full list available at /configs)`.
      options:
        - State of the Commonwealth (DemocracyCraft)
    validations:
      required: false

  - type: textarea
    id: custom_config
    attributes:
      label: Custom Configuration File (JSON format)
      description: Full JSON for the converter config (ignored if you picked a config file)
      render: json
      placeholder: |
        {
          "exclude_question": ["in-game name"],
          "approval_groups": [
            {
              "title": "Executive",
              "contains": [
                "President ",
                "Vice President ",
                "Secretary of ",
                "Attorney General "
              ]
            }
          ]
        }
    validations:
      required: false
